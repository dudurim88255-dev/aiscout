name: Curate AI Tools

on:
  schedule:
    # 매일 KST 07:00 = UTC 22:00 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (MDX 저장 안 함)'
        required: false
        default: 'false'

jobs:
  curate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run curate script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/curate.ts

      - name: Commit and push new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/tools/ data/seen-repos.json
          if git diff --cached --quiet; then
            echo "No new posts to commit."
          else
            git commit -m "feat(tools): add AI tool curation post [$(date -u +%Y-%m-%d)]"
            git pull --rebase origin main
            git push origin main
          fi

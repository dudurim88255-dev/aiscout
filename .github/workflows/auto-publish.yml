name: ?쇰Ц ?먮룞 ?섏쭛 & 諛쒗뻾

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:                 # ?섎룞 ?ㅽ뻾 踰꾪듉

permissions:
  contents: write

jobs:
  auto-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ?쇰Ц ?먮룞 ?섏쭛 & ?ъ뒪???앹꽦
        run: npx tsx scripts/auto-collect.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 蹂寃쎌궗???뺤씤
        id: changes
        run: |
          git add content/
          git diff --staged --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 而ㅻ컠 & ?몄떆
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: ?먮룞 ?쇰Ц ?ъ뒪??$(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Vercel 諛고룷
        if: steps.changes.outputs.changed == 'true'
        run: npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_ruRodWfalxM5k4QldqQgNq7d
          VERCEL_PROJECT_ID: prj_VRiLzJALZXA2HrAH1wtzLsrW0xKR



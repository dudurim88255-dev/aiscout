name: KB Auto Compile

on:
  push:
    paths:
      - 'kb/raw/**'
  schedule:
    - cron: '0 9 * * *'  # 매일 한국시간 18:00 (UTC 09:00)
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  compile-kb:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Find new raw files
        id: find-raw
        run: |
          # raw/ 파일 목록 생성
          RAW_FILES=$(find kb/raw -name "*.md" -type f | sort)
          echo "raw_files<<EOF" >> $GITHUB_OUTPUT
          echo "$RAW_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          RAW_COUNT=$(echo "$RAW_FILES" | grep -c . || echo 0)
          echo "raw_count=$RAW_COUNT" >> $GITHUB_OUTPUT
          echo "Found $RAW_COUNT raw files"
      
      - name: Compile KB with Claude API
        if: steps.find-raw.outputs.raw_count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node kb/scripts/kb-compile-api.mjs
      
      - name: Update INDEX.md
        run: |
          node kb/scripts/compile.mjs
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kb/wiki/ kb/output/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(kb): auto-compile wiki from raw sources"
            git push
          fi

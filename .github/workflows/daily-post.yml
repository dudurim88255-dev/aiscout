name: Daily AI Post Generator

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch:        # GitHub Actions 탭에서 수동 실행 가능

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: RSS 수집 + 포스트 자동 생성
        run: npx tsx scripts/collect-and-generate.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 변경사항 확인
        id: check_changes
        run: |
          git diff --quiet content/posts/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: 자동 커밋 & 푸시
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "aiscout-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/
          git commit -m "auto: $(date +%Y-%m-%d) AI 도구 포스트 자동 생성"
          git push
